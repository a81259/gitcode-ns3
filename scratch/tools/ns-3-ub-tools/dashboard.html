<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ns-3-ub Visual Workbench</title>
    <style>
:root {
  --bg: #edf2f5;
  --panel: #ffffff;
  --ink: #1b2530;
  --muted: #586576;
  --line: #d6dee5;
  --accent: #005fb8;
  --accent-soft: #e9f2ff;
  --btn-height: 30px;
  --btn-radius: 8px;
  --btn-font-size: 12px;
  --btn-pad-x: 12px;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  height: 100%;
  color: var(--ink);
  font-family: "IBM Plex Sans", "Noto Sans", "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 20% 15%, #f8fbff 0, transparent 35%),
    radial-gradient(circle at 90% 5%, #fff6eb 0, transparent 28%),
    linear-gradient(170deg, #eef3f7, #e8edf2);
}

.app {
  height: 100%;
  max-width: 1760px;
  margin: 0 auto;
  padding: 10px 12px 14px;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 10px;
}

.card {
  border: 1px solid var(--line);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.93);
  backdrop-filter: blur(10px);
}

.head {
  position: static;
  padding: 7px 9px;
}

.head h1 {
  margin: 0;
  font-size: 18px;
  letter-spacing: -0.01em;
}

.head p {
  margin: 1px 0 0;
  font-size: 11px;
  color: var(--muted);
}

.tabs {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  margin-top: 0;
  padding: 0;
}

.head-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 4px;
}

.head-main {
  min-width: 0;
  flex: 0 0 auto;
}

.ingest-title {
  margin: 0;
  font-size: 11px;
  font-weight: 700;
  color: #2c4154;
  white-space: nowrap;
}

.ingest-subtitle {
  margin: 0;
  font-size: 11px;
  line-height: 1.2;
  color: var(--muted);
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.ingest-inline {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-right: 6px;
  flex: 1 1 auto;
  justify-content: flex-end;
}

.ingest-controls {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  justify-content: flex-end;
  align-items: center;
  min-width: 0;
}

#folderInput {
  display: none;
}

.upload-btn,
.load-btn,
.tab-btn {
  border: 1px solid var(--line);
  border-radius: var(--btn-radius);
  min-height: var(--btn-height);
  padding: 0 var(--btn-pad-x);
  font-size: var(--btn-font-size);
  font-weight: 600;
  line-height: 1;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex: 0 0 auto;
}

.upload-btn {
  color: #fff;
  background: var(--accent);
  border-color: var(--accent);
}

.load-btn {
  color: #1b5188;
  background: var(--accent-soft);
  border-color: #c8def8;
}

.ingest-status {
  margin: 0;
  font-size: 11px;
  line-height: 1.15;
  color: var(--muted);
  white-space: nowrap;
}

.tab-btn {
  color: #29465f;
  background: #f7fbff;
}

.tab-btn.active {
  color: #fff;
  background: var(--accent);
  border-color: var(--accent);
}

.frames {
  min-height: 0;
  display: grid;
}

.frame {
  width: 100%;
  height: 100%;
  border: 0;
  border-radius: 12px;
  background: #fff;
  display: none;
}

.frame.active {
  display: block;
}

@media (max-width: 860px) {
  .head {
    position: static;
  }

  .app {
    grid-template-rows: auto minmax(720px, 1fr);
  }

  .head-toolbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .head-main {
    width: 100%;
  }

  .tabs {
    flex-wrap: wrap;
  }

  .ingest-inline {
    width: 100%;
    margin-right: 0;
    flex-wrap: wrap;
    justify-content: flex-start;
    order: 3;
  }

  .ingest-subtitle {
    overflow: visible;
    white-space: normal;
  }

  .ingest-controls {
    width: 100%;
    flex-wrap: wrap;
    justify-content: flex-start;
  }
}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="card head">
        <h1>ns-3-ub Visual Workbench</h1>
        <p>流级性能分析与拓扑可视化</p>
        <div class="head-toolbar">
          <div class="head-main">
            <nav class="tabs" aria-label="页面切换">
              <button id="tabDashboard" class="tab-btn active" type="button">性能视图</button>
              <button id="tabTopology" class="tab-btn" type="button">拓扑视图</button>
            </nav>
          </div>
          <div class="ingest-controls">
            <div class="ingest-inline">
              <span class="ingest-title">数据导入</span>
              <span class="ingest-subtitle">选择仿真输出目录, 自动识别 task_statistics.csv、node.csv、topology.csv</span>
              <span id="ingestStatus" class="ingest-status">等待选择文件夹</span>
            </div>
            <label class="upload-btn" for="folderInput">选择文件夹</label>
            <input id="folderInput" type="file" webkitdirectory directory multiple />
            <button id="loadFolderBtn" class="load-btn" type="button">加载数据</button>
          </div>
        </div>
      </header>

      <section class="frames">
        <iframe
          id="frameDashboard"
          class="frame active card"
          title="Flow Completion Analysis Console"
        ></iframe>
        <iframe
          id="frameTopology"
          class="frame card"
          title="Topology Viewer"
        ></iframe>
      </section>
    </main>

function decodeBase64Utf8(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i += 1) {
    bytes[i] = bin.charCodeAt(i);
  }
  return new TextDecoder("utf-8").decode(bytes);
}

function setIngestStatus(text, isWarn = false) {
  refs.ingestStatus.textContent = text;
  refs.ingestStatus.style.color = isWarn ? "#b45309" : "var(--muted)";
}

function normalizeRelativePath(fileLike) {
  return String(fileLike?.webkitRelativePath ?? fileLike?.name ?? "")
    .replaceAll("\\", "/")
    .trim();
}

function splitDirAndBase(pathLike) {
  const normalized = String(pathLike ?? "").trim();
  const idx = normalized.lastIndexOf("/");
  if (idx < 0) {
    return { dir: ".", base: normalized };
  }
  return {
    dir: normalized.slice(0, idx) || ".",
    base: normalized.slice(idx + 1),
  };
}

function dirDepth(dir) {
  return String(dir ?? "")
    .split("/")
    .filter(Boolean).length;
}

function detectFolderArtifacts(fileList) {
  const files = Array.from(fileList ?? []);
  const taskCandidates = [];
  const pairMap = new Map();

  files.forEach((file) => {
    const rel = normalizeRelativePath(file);
    if (!rel) {
      return;
    }
    const { dir, base } = splitDirAndBase(rel);
    const lower = base.toLowerCase();

    if (lower === "task_statistics.csv") {
      taskCandidates.push({ file, dir, rel });
      return;
    }

    if (lower === "node.csv" || lower === "topology.csv") {
      if (!pairMap.has(dir)) {
        pairMap.set(dir, { directory: dir, nodeFile: null, topologyFile: null });
      }
      const record = pairMap.get(dir);
      if (lower === "node.csv") {
        record.nodeFile = file;
      } else {
        record.topologyFile = file;
      }
    }
  });

  const pairs = Array.from(pairMap.values())
    .filter((item) => item.nodeFile && item.topologyFile)
    .sort((a, b) => {
      const depthDiff = dirDepth(a.directory) - dirDepth(b.directory);
      if (depthDiff !== 0) {
        return depthDiff;
      }
      return String(a.directory).localeCompare(String(b.directory));
    });

  const selectedPair = pairs[0] ?? null;
  const sortedTask = taskCandidates.sort((a, b) => {
    const aSame = selectedPair && a.dir === selectedPair.directory ? 0 : 1;
    const bSame = selectedPair && b.dir === selectedPair.directory ? 0 : 1;
    if (aSame !== bSame) {
      return aSame - bSame;
    }
    const depthDiff = dirDepth(a.dir) - dirDepth(b.dir);
    if (depthDiff !== 0) {
      return depthDiff;
    }
    return a.rel.localeCompare(b.rel);
  });

  return {
    taskFile: sortedTask[0]?.file ?? null,
    topologyPair: selectedPair,
    topologyPairCount: pairs.length,
  };
}

function activate(name) {
  const isDashboard = name === "dashboard";
  tabs.dashboard.classList.toggle("active", isDashboard);
  tabs.topology.classList.toggle("active", !isDashboard);
  frames.dashboard.classList.toggle("active", isDashboard);
  frames.topology.classList.toggle("active", !isDashboard);
}

function injectFrameStyle(doc, id, cssText) {
  if (!doc?.head) {
    return;
  }
  if (doc.getElementById(id)) {
    return;
  }
  const style = doc.createElement("style");
  style.id = id;
  style.textContent = cssText;
  doc.head.appendChild(style);
}

        align-items: center !important;
        justify-content: center !important;
        height: var(--btn-height) !important;
        min-width: 88px !important;
        padding: 0 var(--btn-pad-x) !important;
        border-radius: var(--btn-radius) !important;
        border: 1px solid #c8def8 !important;
        background: var(--accent-soft) !important;
        color: #1b5188 !important;
        font-size: var(--btn-font-size) !important;
        font-weight: 600 !important;
        line-height: 1 !important;
        white-space: nowrap !important;
      }
      .filters.parent-filters-collapsed .filter-grid {
        display: none !important;
      }
      .filter-head {
        margin-bottom: 6px !important;
        align-items: center !important;
      }
      .filter-grid {
        gap: 6px !important;
      }
      .filter-item p {
        margin: 0 0 2px !important;
      }
      .filter-input {
        padding: 5px 7px !important;
      }
      .range-wrap {
        gap: 4px !important;
      }
      .detail-card { top: var(--sticky-detail-top) !important; }
    `
  );
  if (typeof win.syncStickyLayoutVars === "function") {
    win.syncStickyLayoutVars();
  }
}

function setupDashboardFilterToolbar(win) {
  const doc = win.document;
  const filtersSection = doc.querySelector(".filters");
  const filterHead = filtersSection?.querySelector(".filter-head");
  const actions = filterHead?.querySelector(".filter-head-actions");
  if (!filtersSection || !filterHead || !actions) {
    return;
  }

  let toggleBtn = doc.getElementById("parentToggleFiltersBtn");
  if (!toggleBtn) {
    toggleBtn = doc.createElement("button");
    toggleBtn.id = "parentToggleFiltersBtn";
    toggleBtn.type = "button";
    toggleBtn.className = "button ghost filter-reset-btn parent-filter-toggle-btn";
    actions.appendChild(toggleBtn);
  }

  const syncCollapsedState = (collapsed) => {
    filtersSection.classList.toggle("parent-filters-collapsed", collapsed);
    toggleBtn.textContent = collapsed ? "展开筛选" : "收起筛选";
    toggleBtn.setAttribute("aria-expanded", String(!collapsed));
    if (typeof win.syncStickyLayoutVars === "function") {
      win.syncStickyLayoutVars();
    }
  };

  if (toggleBtn.dataset.bound !== "1") {
    toggleBtn.addEventListener("click", () => {
      const collapsed = !filtersSection.classList.contains("parent-filters-collapsed");
      syncCollapsedState(collapsed);
    });
    toggleBtn.dataset.bound = "1";
  }

  syncCollapsedState(filtersSection.classList.contains("parent-filters-collapsed"));
}

function streamlineTopologyFrame(win) {
  injectFrameStyle(
    win.document,
    "parent-unified-style-topology",
    `
      .sticky-topbar { display: none !important; }
      .app { grid-template-rows: auto 1fr !important; }
      .sticky-toolbar { top: 8px !important; }
      .detail-panel { top: 96px !important; max-height: calc(100vh - 112px) !important; }
    `
  );
}

function waitForFrameApi(frame, checker, timeoutMs = 7000) {
  return new Promise((resolve, reject) => {
    const started = Date.now();
    const tick = () => {
      const win = frame?.contentWindow;
      if (win && checker(win)) {
        resolve(win);
        return;
      }
      if (Date.now() - started > timeoutMs) {
        reject(new Error("frame api not ready"));
        return;
      }
      window.setTimeout(tick, 50);
    };
    tick();
  });
}

async function getDashboardApi() {
  if (frameApiCache.dashboard) {
    return frameApiCache.dashboard;
  }
  const win = await waitForFrameApi(
    frames.dashboard,
    (cw) => typeof cw.loadCsvText === "function"
  );
  applyUnifiedVisualSystem(win);
  streamlineDashboardFrame(win);
  setupDashboardFilterToolbar(win);
  frameApiCache.dashboard = win;
  return win;
}

async function getTopologyApi() {
  if (frameApiCache.topology) {
    return frameApiCache.topology;
  }
  const win = await waitForFrameApi(
    frames.topology,
    (cw) => typeof cw.renderFromCsv === "function"
  );
  applyUnifiedVisualSystem(win);
  streamlineTopologyFrame(win);
  frameApiCache.topology = win;
  return win;
}

async function loadUnifiedFolder() {
  const files = refs.folderInput.files;
  if (!files || files.length === 0) {
    setIngestStatus("未检测到文件夹内容, 请重新选择", true);
    return;
  }

  setIngestStatus(`正在解析 ${files.length} 个文件 ...`);
  const detected = detectFolderArtifacts(files);
  const loadedParts = [];
  const notes = [];

  if (detected.taskFile) {
    try {
      const text = await detected.taskFile.text();
      const dashboard = await getDashboardApi();
      dashboard.loadCsvText(detected.taskFile.name, text);
      loadedParts.push("流任务统计(task_statistics.csv)");
    } catch (error) {
      notes.push(`流任务统计加载失败: ${error.message}`);
    }
  } else {
    notes.push("未找到 task_statistics.csv");
  }

  if (detected.topologyPair) {
    try {
      const [nodeCsvText, topologyCsvText] = await Promise.all([
        detected.topologyPair.nodeFile.text(),
        detected.topologyPair.topologyFile.text(),
      ]);
      const topology = await getTopologyApi();
      await topology.renderFromCsv(
        nodeCsvText,
        topologyCsvText,
        detected.topologyPair.directory
      );
      loadedParts.push(`拓扑结构(${detected.topologyPair.directory})`);
      if (detected.topologyPairCount > 1) {
        notes.push(`检测到 ${detected.topologyPairCount} 组拓扑文件, 已自动选择第一组`);
      }
    } catch (error) {
      notes.push(`拓扑加载失败: ${error.message}`);
    }
  } else {
    notes.push("未找到 node.csv + topology.csv");
  }

  if (loadedParts.length === 0) {
    setIngestStatus(`未完成加载. ${notes.join(" | ")}`, true);
    return;
  }

  const suffix = notes.length ? ` | ${notes.join(" | ")}` : "";
  setIngestStatus(`已加载: ${loadedParts.join(" ; ")}${suffix}`, notes.length > 0);
}

function reportInitError(viewLabel, error) {
  const reason = error?.message ?? String(error);
  const message = `${viewLabel}初始化失败: ${reason}`;
  const current = String(refs.ingestStatus.textContent ?? "").trim();
  if (!current || current === "等待选择文件夹") {
    setIngestStatus(message, true);
  } else if (!current.includes(message)) {
    setIngestStatus(`${current} | ${message}`, true);
  }
  console.error(`[visual-workbench] ${viewLabel} init failed`, error);
}

function init() {
  frames.dashboard.srcdoc = decodeBase64Utf8(DASHBOARD_B64);
  frames.topology.srcdoc = decodeBase64Utf8(TOPOLOGY_B64);

  tabs.dashboard.addEventListener("click", () => activate("dashboard"));
  tabs.topology.addEventListener("click", () => activate("topology"));
  refs.loadFolderBtn.addEventListener("click", loadUnifiedFolder);
  refs.folderInput.addEventListener("change", () => {
    loadUnifiedFolder();
  });

  // Apply unified shell style to embedded pages as soon as their APIs are ready.
  getDashboardApi().catch((error) => reportInitError("性能视图", error));
  getTopologyApi().catch((error) => reportInitError("拓扑视图", error));
  setIngestStatus("等待选择文件夹");
}

init();
    </script>
  </body>
</html>
